<!DOCTYPE html>
<!-- ================= NAVBAR ================= -->

<header class="reservation-navbar">

  <div class="reservation-nav-container">

    <a href="../index.html" class="back-home">
      <i class="ri-arrow-left-line"></i>
      Retour Accueil
    </a>

    <div class="reservation-logo">
      <img src="/assets/images/logo1.png" alt="logo">
    </div>

  </div>

</header>

      <form id="reservationForm">

        <div class="input-group">
          <label>Nom</label>
          <input type="text" id="name" required>
        </div>

        <div class="input-group">
          <label>Téléphone</label>
          <input type="text" id="phone" required>
        </div>

        <div class="input-group">
          <label>Service</label>
          <select id="service">
            <option>Enregistrement</option>
            <option>Mixage</option>
            <option>Mastering</option>
            <option>Clip Vidéo</option>
          </select>
        </div>

        <div class="calendar-box">
          <input type="date" id="date" required>
        </div>

        <div class="time-slots" id="timeSlots"></div>

        <textarea id="message" placeholder="Votre projet..."></textarea>

        <button type="submit" class="reserve-btn">
          <i class="ri-whatsapp-line"></i>
          Réserver Maintenant
        </button>

      </form>

    </div>

    <div class="booking-right">

      <img src="/reservation/assets/images/studio.png">

      <div class="floating-card">
        <h3>Studio Premium</h3>
        <p>Audio • Video • Mastering</p>
      </div>

    </div>

  </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script src="/reservation/js/particles.js"></script>
<script src="/reservation/js/calendar.js"></script>
<script src="/reservation/js/three-scene.js"></script>
<script src="/reservation/js/reservation.js"></script>

</body>
</html>
